name: Build Android APK

on:
  push:
    branches:
      - master
  workflow_dispatch:
    inputs:
      web_url:
        description: 'WebView target URL'
        required: true
        default: 'https://ksp.karon.cn/desk'

jobs:
  build-debug-apk:
    runs-on: ubuntu-latest
    env:
      WEB_URL: ${{ github.event.inputs.web_url || 'https://ksp.karon.cn/desk' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 8.10.2

      - name: Build debug APK
        working-directory: android-wrapper
        run: gradle assembleDebug -PKSP_WEB_URL="$WEB_URL"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: karon-ksp-debug-apk
          path: android-wrapper/app/build/outputs/apk/debug/app-debug.apk